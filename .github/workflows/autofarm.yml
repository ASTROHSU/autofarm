name: AutoFarm Scheduled Run

on:
  schedule:
    # 每天 UTC 23:00（台灣時間 07:00）
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 用 cache 持久化 seen.json
      - name: Cache state files
        uses: actions/cache@v4
        with:
          path: data/
          key: autofarm-state-${{ github.run_id }}
          restore-keys: autofarm-state-

      # 確保 data 目錄和檔案存在
      - name: Ensure data dir
        run: |
          mkdir -p data
          [ -f data/seen.json ] || echo '[]' > data/seen.json
          [ -f data/pending.json ] || echo '[]' > data/pending.json

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python farm.py --run --push-notion --limit 5
