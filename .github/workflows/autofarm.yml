name: AutoFarm Scheduled Run

on:
  schedule:
    # 週三、週六 UTC 01:00（台灣時間 09:00）
    - cron: '0 1 * * 3,6'
  workflow_dispatch: # 手動觸發

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 從上次的 artifact 還原 seen.json
      - name: Restore seen.json
        uses: dawidd6/action-download-artifact@v6
        with:
          name: autofarm-state
          path: data/
          if_no_artifact_found: warn
          search_artifacts: true
          workflow: autofarm.yml

      # 確保 data 目錄存在
      - name: Ensure data dir
        run: |
          mkdir -p data
          [ -f data/seen.json ] || echo '[]' > data/seen.json
          [ -f data/pending.json ] || echo '[]' > data/pending.json

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python farm.py --run --push-notion

      # 保存 seen.json 供下次使用
      - name: Save state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autofarm-state
          path: |
            data/seen.json
            data/pending.json
          overwrite: true
          retention-days: 90
