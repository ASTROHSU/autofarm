<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFarm</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">

    <header>
      <h1>AutoFarm</h1>
      <div class="tabs">
        <button data-filter="" class="active">全部</button>
        <button data-filter="待審閱">待審閱</button>
        <button data-filter="待發布">待發布</button>
        <span style="border-left:1px solid #d0d0d0; margin:0 4px"></span>
        <button data-importance="高">高</button>
        <button data-importance="中">中</button>
        <button data-importance="低">低</button>
        <button id="publish-tab">發布草稿</button>
        <button id="skip-all-btn" class="skip-all-btn">全部略過</button>
      </div>
    </header>

    <!-- ===== 文章列表 ===== -->
    <div id="list-view" class="active">
      <div id="article-list" class="article-list">
        <p class="loading">載入中...</p>
      </div>
    </div>

    <!-- ===== 發布草稿 ===== -->
    <div id="publish-view" class="publish-view">
      <div class="editor-header">
        <h2>發布草稿（Substack 格式）</h2>
        <div>
          <button id="copy-btn" class="btn btn-secondary">複製到剪貼簿</button>
          <button id="publish-back-btn" class="back-btn" style="margin-left:8px">← 返回列表</button>
        </div>
      </div>
      <div id="publish-draft" class="publish-draft">
        <p class="loading">載入中...</p>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
