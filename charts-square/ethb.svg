<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="1200" height="1200">
<rect width="600" height="600" fill="white"/>

<!-- Title -->
<text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a" font-family="system-ui, -apple-system, sans-serif">ETHB 質押收益流向與 Coinbase 雙重角色</text>

<!-- Subtitle -->
<text x="300" y="58" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">BlackRock 首檔可質押的以太幣 ETF，打破 SEC 禁令</text>

<!-- ETH Staking source -->
<rect x="175" y="80" width="250" height="55" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="300" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9" font-family="system-ui, -apple-system, sans-serif">ETH 質押獎勵</text>
<text x="300" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9" font-family="system-ui, -apple-system, sans-serif">~3.5% 年化報酬</text>

<!-- Split arrow -->
<line x1="300" y1="135" x2="300" y2="165" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-p)"/>

<!-- Split node -->
<circle cx="300" cy="178" r="16" fill="#8b5cf6"/>
<text x="300" y="183" text-anchor="middle" font-size="12" fill="white" font-weight="700" font-family="system-ui, -apple-system, sans-serif">分</text>

<!-- 82% arrow left-down -->
<line x1="284" y1="190" x2="200" y2="225" stroke="#10b981" stroke-width="2.5" marker-end="url(#arr-g)"/>
<text x="228" y="208" font-size="11" fill="#10b981" font-weight="700" font-family="system-ui, -apple-system, sans-serif">82%</text>

<!-- 18% arrow right-down -->
<line x1="316" y1="190" x2="400" y2="225" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arr-o)"/>
<text x="370" y="208" font-size="11" fill="#d97706" font-weight="700" font-family="system-ui, -apple-system, sans-serif">18%</text>

<!-- Investor box -->
<rect x="80" y="230" width="220" height="65" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
<text x="190" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">ETHB 投資人</text>
<text x="190" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">實得 ~2.87%</text>

<!-- Platform box -->
<rect x="320" y="230" width="220" height="65" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="430" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">BlackRock + Coinbase</text>
<text x="430" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">抽成 ~0.63%</text>

<!-- Divider -->
<line x1="80" y1="325" x2="520" y2="325" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

<!-- Coinbase dual role section -->
<text x="300" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif">Coinbase 雙重角色</text>

<!-- Role 1 -->
<rect x="80" y="375" width="220" height="75" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="190" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">角色一：託管方</text>
<text x="190" y="422" text-anchor="middle" font-size="11" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">託管逾 80% 美國加密 ETP</text>
<text x="190" y="440" text-anchor="middle" font-size="11" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">保管投資人的 ETH</text>

<!-- Role 2 -->
<rect x="320" y="375" width="220" height="75" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="430" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">角色二：質押執行方</text>
<text x="430" y="422" text-anchor="middle" font-size="11" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">負責將 ETH 送進質押網路</text>
<text x="430" y="440" text-anchor="middle" font-size="11" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">從中分潤</text>

<!-- Stats -->
<rect x="120" y="480" width="360" height="55" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="300" y="503" text-anchor="middle" font-size="12" font-weight="600" fill="#374151" font-family="system-ui, -apple-system, sans-serif">$ETHB 初始規模 $1.07 億　|　首日交易量 $1,550 萬</text>
<text x="300" y="523" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">拜登時期 SEC 禁止質押 → 川普政府逆轉 → BlackRock 首發</text>

<!-- Source -->
<text x="300" y="570" text-anchor="middle" font-size="9" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif">來源：CoinDesk（2026/03/12）</text>

<defs>
  <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
  <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
  <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker>
</defs>
</svg>
