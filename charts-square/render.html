<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body { background: white; }
.chart-container {
  width: 1200px;
  height: 1200px;
  display: none;
}
.chart-container.active {
  display: block;
}
.chart-container svg {
  width: 1200px;
  height: 1200px;
}
</style>
</head>
<body>
<div id="chart-bis" class="chart-container active"></div>
<div id="chart-across" class="chart-container"></div>
<div id="chart-ethb" class="chart-container"></div>
<div id="chart-ramp" class="chart-container"></div>
<div id="chart-xstocks" class="chart-container"></div>
<script>
// Charts will be loaded via fetch
const charts = ['bis', 'across', 'ethb', 'ramp', 'xstocks'];
charts.forEach(name => {
  fetch(name + '.svg')
    .then(r => r.text())
    .then(svg => {
      document.getElementById('chart-' + name).innerHTML = svg;
    });
});

function showChart(name) {
  document.querySelectorAll('.chart-container').forEach(el => el.classList.remove('active'));
  document.getElementById('chart-' + name).classList.add('active');
}
</script>
</body>
</html>
