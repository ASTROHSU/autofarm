<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="1200" height="1200">
<rect width="600" height="600" fill="white"/>

<!-- Title -->
<text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a" font-family="system-ui, -apple-system, sans-serif">AI 代理人付款的兩條路線</text>

<!-- Subtitle -->
<text x="300" y="58" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">AI 什麼都會做，就是不會付錢——Ramp 和 Coinbase 各有答案</text>

<!-- AI Agent (shared start) -->
<rect x="200" y="78" width="200" height="55" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
<text x="300" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a" font-family="system-ui, -apple-system, sans-serif">AI 代理人</text>
<text x="300" y="120" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">需要付款</text>

<!-- Two arrows down -->
<line x1="220" y1="133" x2="170" y2="168" stroke="#10b981" stroke-width="2.5" marker-end="url(#arr-g)"/>
<line x1="380" y1="133" x2="430" y2="168" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arr-o)"/>

<!-- ===== LEFT: Card Route (Green) ===== -->
<text x="170" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981" font-family="system-ui, -apple-system, sans-serif">卡片路線</text>

<rect x="60" y="175" width="210" height="45" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="165" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">Ramp Agent Card</text>
<text x="165" y="212" text-anchor="middle" font-size="10" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">專供 AI 的虛擬卡</text>

<line x1="165" y1="220" x2="165" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>

<rect x="60" y="245" width="210" height="45" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="165" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">Visa / Mastercard 網路</text>
<text x="165" y="282" text-anchor="middle" font-size="10" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">既有支付軌道</text>

<line x1="165" y1="290" x2="165" y2="310" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>

<rect x="60" y="315" width="210" height="45" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
<text x="165" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">全球店家 ✓ 可用</text>
<text x="165" y="352" text-anchor="middle" font-size="10" fill="#065f46" font-family="system-ui, -apple-system, sans-serif">今天就能用</text>

<!-- ===== RIGHT: Stablecoin Route (Orange) ===== -->
<text x="430" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706" font-family="system-ui, -apple-system, sans-serif">穩定幣路線</text>

<rect x="330" y="175" width="210" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="435" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">加密錢包</text>
<text x="435" y="212" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">USDC / USDT</text>

<line x1="435" y1="220" x2="435" y2="240" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-o)"/>

<rect x="330" y="245" width="210" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="435" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">鏈上支付 / x402 協定</text>
<text x="435" y="282" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">Base 推出的 AI 支付協定</text>

<line x1="435" y1="290" x2="435" y2="310" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-o)"/>

<rect x="330" y="315" width="210" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="435" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">接受穩定幣 ✗ 極少數</text>
<text x="435" y="352" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, -apple-system, sans-serif">需要商家支援</text>

<!-- Divider -->
<line x1="80" y1="390" x2="520" y2="390" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

<!-- Key features -->
<text x="300" y="418" text-anchor="middle" font-size="13" font-weight="700" fill="#374151" font-family="system-ui, -apple-system, sans-serif">Ramp Agent Card 特色</text>

<rect x="80" y="435" width="150" height="50" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="155" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" font-family="system-ui, -apple-system, sans-serif">設定交易對象</text>
<text x="155" y="474" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">只能刷指定商家</text>

<rect x="245" y="435" width="140" height="50" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="315" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" font-family="system-ui, -apple-system, sans-serif">預算上限</text>
<text x="315" y="474" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">用完即丟</text>

<rect x="400" y="435" width="140" height="50" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="470" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" font-family="system-ui, -apple-system, sans-serif">卡號不外露</text>
<text x="470" y="474" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">授權給 AI 不怕亂刷</text>

<!-- Ramp valuation -->
<text x="300" y="520" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">Ramp 估值：$76.5 億（2023）→ $320 億（2025）</text>

<!-- Legend -->
<text x="300" y="555" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">綠色 = 今天可行的路線　　橘色 = 未來路線（受限於商家接受度）</text>

<!-- Source -->
<text x="300" y="580" text-anchor="middle" font-size="9" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif">來源：Ramp Blog（2026/03/11）</text>

<defs>
  <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
  <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker>
</defs>
</svg>
