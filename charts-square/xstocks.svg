<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="1200" height="1200">
<rect width="600" height="600" fill="white"/>

<!-- Title -->
<text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a" font-family="system-ui, -apple-system, sans-serif">股票代幣化的兩種模式</text>

<!-- Subtitle -->
<text x="300" y="58" text-anchor="middle" font-size="11" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">Ondo 間接模式 vs Nasdaq + Kraken 直接模式</text>

<!-- ===== Model A: Ondo (top half) ===== -->
<text x="300" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#8b5cf6" font-family="system-ui, -apple-system, sans-serif">模式 A：Ondo Finance（間接模式）</text>

<rect x="200" y="100" width="200" height="40" rx="6" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="300" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9" font-family="system-ui, -apple-system, sans-serif">鏈上投資人</text>

<line x1="300" y1="140" x2="300" y2="158" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-p)"/>
<text x="340" y="153" font-size="10" fill="#8b5cf6" font-family="system-ui, -apple-system, sans-serif">買代幣</text>

<rect x="200" y="163" width="200" height="40" rx="6" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="300" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9" font-family="system-ui, -apple-system, sans-serif">Ondo 鑄造代幣</text>

<line x1="300" y1="203" x2="300" y2="221" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-p)"/>
<text x="340" y="216" font-size="10" fill="#8b5cf6" font-family="system-ui, -apple-system, sans-serif">同步買股</text>

<rect x="140" y="226" width="140" height="40" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="210" y="251" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca" font-family="system-ui, -apple-system, sans-serif">傳統券商</text>

<line x1="280" y1="246" x2="310" y2="246" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-i)"/>

<rect x="320" y="226" width="140" height="40" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
<text x="390" y="251" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca" font-family="system-ui, -apple-system, sans-serif">股票交易所</text>

<text x="510" y="251" font-size="10" fill="#6b7280" font-style="italic" font-family="system-ui, -apple-system, sans-serif">間接持有</text>

<!-- Divider -->
<line x1="60" y1="290" x2="540" y2="290" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="5,5"/>

<!-- ===== Model B: Nasdaq + Kraken (bottom half) ===== -->
<text x="300" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif">模式 B：Nasdaq + Kraken（直接模式）</text>

<rect x="200" y="332" width="200" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="300" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">Nasdaq 發行股票</text>

<line x1="300" y1="372" x2="300" y2="390" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
<text x="340" y="385" font-size="10" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif">直接代幣化</text>

<rect x="175" y="395" width="250" height="48" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="300" y="416" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">Kraken xStocks</text>
<text x="300" y="434" text-anchor="middle" font-size="10" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">1:1 擔保 + 保留投票權與股東權利</text>

<!-- Two destinations -->
<line x1="240" y1="443" x2="180" y2="470" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
<line x1="360" y1="443" x2="420" y2="470" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arr-pk)"/>

<rect x="80" y="475" width="190" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="175" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif">受監管機構市場</text>

<rect x="330" y="475" width="190" height="40" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
<text x="425" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#9d174d" font-family="system-ui, -apple-system, sans-serif">DeFi 市場</text>

<!-- Bidirectional arrow -->
<path d="M 270 495 L 330 495" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-gg)"/>
<path d="M 330 490 L 270 490" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr-gg)"/>
<text x="300" y="485" text-anchor="middle" font-size="9" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif">自由流動</text>

<!-- Stats -->
<rect x="120" y="535" width="360" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="300" y="555" text-anchor="middle" font-size="11" fill="#374151" font-family="system-ui, -apple-system, sans-serif">xStocks：$250 億交易量 | 85,000 持有者 | 預計 2027 H1 上線</text>

<!-- Source -->
<text x="300" y="585" text-anchor="middle" font-size="9" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif">來源：Kraken Blog、CoinDesk（2026/03/13）</text>

<defs>
  <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
  <marker id="arr-i" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker>
  <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
  <marker id="arr-pk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ec4899"/></marker>
  <marker id="arr-gg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#9ca3af"/></marker>
</defs>
</svg>
