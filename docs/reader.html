<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf9f6">
<title>AutoFarm Reader</title>
<link rel="icon" type="image/png" href="https://i.urusai.cc/yaku8.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f6;
  --bg-secondary: #f0ece6;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999;
  --accent: #e8a87c;
  --accent-dim: rgba(232, 168, 124, 0.15);
  --border: #e8e3d8;
  --shadow: rgba(0,0,0,0.04);
  --shadow-md: rgba(0,0,0,0.08);
  --reader-bar: #faf9f6;
  --digest-color: #2a6f8a;
  --digest-bg: #e8f4f8;
  --morning-color: #b8860b;
  --morning-bg: #fef3e2;
  --evening-color: #7b4f9d;
  --evening-bg: #f0e6f6;
  --weekly-color: #2d6a4f;
  --weekly-bg: #e8f5ee;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #121212;
  --bg-secondary: #1e1e1e;
  --surface: #1e1e1e;
  --text: #e0e0e0;
  --text-secondary: #9e9e9e;
  --text-tertiary: #666;
  --accent: #e8a87c;
  --accent-dim: rgba(232, 168, 124, 0.12);
  --border: #2e2e2e;
  --shadow: rgba(0,0,0,0.2);
  --shadow-md: rgba(0,0,0,0.3);
  --reader-bar: #121212;
  --digest-color: #5fb8d4;
  --digest-bg: #1a2e35;
  --morning-color: #e8b84a;
  --morning-bg: #2e2510;
  --evening-color: #b88fda;
  --evening-bg: #251a2e;
  --weekly-color: #5fbf8a;
  --weekly-bg: #1a2e22;
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 16px;
  min-height: 100vh;
  min-height: 100dvh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* ========== Top Bar ========== */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition), border-color var(--transition), transform 0.3s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.topbar-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  display: none;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 14px;
  cursor: pointer;
  padding: 6px 8px;
  margin-left: -8px;
  border-radius: 6px;
  transition: background 0.15s;
  font-family: inherit;
}
.back-btn:hover { background: var(--accent-dim); }
.back-btn svg { width: 18px; height: 18px; }

.topbar-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
  cursor: pointer;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.icon-btn:hover { background: var(--bg-secondary); color: var(--text); }
.icon-btn svg { width: 20px; height: 20px; }

/* Font size popup */
.font-popup {
  position: absolute;
  top: 44px;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  display: none;
  box-shadow: 0 4px 20px var(--shadow-md);
  flex-direction: row;
  gap: 4px;
  z-index: 101;
}
.font-popup.show { display: flex; }
.font-opt {
  background: none;
  border: 1px solid transparent;
  color: var(--text-secondary);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.font-opt:hover { background: var(--bg-secondary); }
.font-opt.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}

/* Reading progress */
.progress-bar {
  position: fixed;
  top: 56px; left: 0; right: 0;
  height: 2px;
  background: transparent;
  z-index: 99;
  opacity: 0;
  transition: opacity 0.3s;
}
.progress-bar.show { opacity: 1; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
}

/* ========== Main Content Area ========== */
.app {
  padding-top: 56px;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ========== List View ========== */
.list-view {
  max-width: 680px;
  margin: 0 auto;
  padding: 24px 20px 80px;
  transition: opacity 0.25s ease;
}

.list-header {
  padding: 20px 0 28px;
}

.list-header h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: 1px;
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.filters::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--text-secondary); }
.filter-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* Date groups */
.date-group {
  margin-bottom: 8px;
}

.date-label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  padding: 16px 0 8px;
  position: sticky;
  top: 56px;
  background: var(--bg);
  z-index: 10;
  transition: background var(--transition);
}

/* Article cards */
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.card:last-child { border-bottom: none; }
.card:hover .card-title { color: var(--accent); }
.card:active { opacity: 0.7; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.type-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 4px;
  letter-spacing: 0.3px;
}
.type-digest { background: var(--digest-bg); color: var(--digest-color); }
.type-morning { background: var(--morning-bg); color: var(--morning-color); }
.type-evening { background: var(--evening-bg); color: var(--evening-color); }
.type-weekly { background: var(--weekly-bg); color: var(--weekly-color); }

.card-date {
  font-size: 12px;
  color: var(--text-tertiary);
}

.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text);
  transition: color 0.15s;
}

/* ========== Reader View ========== */
.reader-view {
  display: none;
  width: 100%;
  min-height: calc(100vh - 56px);
  min-height: calc(100dvh - 56px);
}

.reader-view.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

.reader-frame {
  width: 100%;
  height: calc(100vh - 56px);
  height: calc(100dvh - 56px);
  border: none;
  background: var(--bg);
}

/* ========== Empty / Loading States ========== */
.loading {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-tertiary);
  font-size: 14px;
}

.loading-spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

.empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-tertiary);
  font-size: 14px;
}

/* ========== Keyboard hint ========== */
.key-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-tertiary);
  box-shadow: 0 2px 12px var(--shadow);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 50;
}
.key-hint.show { opacity: 1; }
.key-hint kbd {
  display: inline-block;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-family: inherit;
  font-size: 11px;
  margin: 0 2px;
}

/* ========== Animations ========== */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ========== Responsive ========== */
@media (max-width: 600px) {
  .topbar-inner { padding: 0 16px; height: 50px; }
  .topbar-title { font-size: 16px; }
  .list-view { padding: 16px 16px 80px; }
  .date-label { top: 50px; }
  .card-title { font-size: 17px; }
  .progress-bar { top: 50px; }
  .reader-frame {
    height: calc(100vh - 50px);
    height: calc(100dvh - 50px);
  }
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <button class="back-btn" id="backBtn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>返回</span>
      </button>
      <span class="topbar-title" id="topbarTitle" onclick="goHome()">AutoFarm</span>
    </div>
    <div class="topbar-right">
      <!-- Font size -->
      <button class="icon-btn" id="fontBtn" onclick="toggleFontPopup()" title="字級">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <div class="font-popup" id="fontPopup">
          <button class="font-opt" data-size="small" onclick="setFontSize('small')" style="font-size:13px">小</button>
          <button class="font-opt active" data-size="medium" onclick="setFontSize('medium')" style="font-size:15px">中</button>
          <button class="font-opt" data-size="large" onclick="setFontSize('large')" style="font-size:17px">大</button>
        </div>
      </button>
      <!-- Dark mode -->
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="深色模式">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Reading progress bar -->
<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- App Container -->
<div class="app">
  <!-- List View -->
  <div class="list-view" id="listView">
    <div class="list-header">
      <h2>每日電子報摘要與深度故事</h2>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="digest" onclick="setFilter('digest')">日報</button>
      <button class="filter-btn" data-filter="morning" onclick="setFilter('morning')">早晨版</button>
      <button class="filter-btn" data-filter="evening" onclick="setFilter('evening')">晚間版</button>
    </div>

    <div id="articleList">
      <div class="loading">
        <div class="loading-spinner"></div>
        載入中⋯
      </div>
    </div>
  </div>

  <!-- Reader View -->
  <div class="reader-view" id="readerView">
    <iframe class="reader-frame" id="readerFrame" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
  </div>
</div>

<!-- Keyboard hint -->
<div class="key-hint" id="keyHint">
  <kbd>Esc</kbd> 返回列表　<kbd>J</kbd> / <kbd>K</kbd> 上下篇
</div>

<script>
// ========== State ==========
let entries = [];
let currentFilter = 'all';
let currentIndex = -1;
let isReading = false;
let fontSize = 'medium';
let isDark = false;
let scrollY = 0;

// ========== Init ==========
document.addEventListener('DOMContentLoaded', init);

async function init() {
  // Restore preferences
  isDark = localStorage.getItem('af-theme') === 'dark' ||
    (!localStorage.getItem('af-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) applyTheme(true);

  fontSize = localStorage.getItem('af-fontsize') || 'medium';
  updateFontButtons();

  // Load manifest
  try {
    const res = await fetch('manifest.json');
    const data = await res.json();
    entries = (data.entries || []).map((e, i) => ({ ...e, _idx: i }));
    renderList();
  } catch (e) {
    document.getElementById('articleList').innerHTML =
      '<div class="empty">無法載入文章索引</div>';
  }

  // Check URL hash for deep link
  if (location.hash) {
    const idx = parseInt(location.hash.slice(1));
    if (!isNaN(idx) && idx >= 0 && idx < entries.length) {
      openArticle(idx);
    }
  }
}

// ========== Rendering ==========
function renderList() {
  const container = document.getElementById('articleList');
  const filtered = currentFilter === 'all'
    ? entries
    : entries.filter(e => e.type === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">沒有符合的文章</div>';
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(entry => {
    const date = entry.date || 'unknown';
    if (!groups[date]) groups[date] = [];
    groups[date].push(entry);
  });

  const sortedDates = Object.keys(groups).sort().reverse();
  let html = '';

  sortedDates.forEach(date => {
    const weekday = getWeekday(date);
    html += `<div class="date-group">`;
    html += `<div class="date-label">${date}${weekday ? '　' + weekday : ''}</div>`;

    groups[date].forEach(entry => {
      const typeInfo = getTypeInfo(entry);
      html += `
        <div class="card" onclick="openArticle(${entry._idx})" role="button" tabindex="0">
          <div class="card-meta">
            <span class="type-badge ${typeInfo.cls}">${typeInfo.label}</span>
          </div>
          <div class="card-title">${escHtml(entry.title)}</div>
        </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function getTypeInfo(entry) {
  // Check if it's a weekly digest
  if (entry.title && (entry.title.includes('週') || entry.title.includes('精選'))) {
    return { label: '週報', cls: 'type-weekly' };
  }
  const map = {
    digest: { label: '日報', cls: 'type-digest' },
    morning: { label: '早晨版', cls: 'type-morning' },
    evening: { label: '晚間版', cls: 'type-evening' }
  };
  return map[entry.type] || { label: '文章', cls: 'type-digest' };
}

function getWeekday(dateStr) {
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
  } catch { return ''; }
}

// ========== Navigation ==========
function openArticle(idx) {
  if (idx < 0 || idx >= entries.length) return;
  currentIndex = idx;
  isReading = true;

  // Save scroll position
  scrollY = window.scrollY;

  const entry = entries[idx];
  const frame = document.getElementById('readerFrame');

  // Show reader
  document.getElementById('listView').style.display = 'none';
  document.getElementById('readerView').classList.add('active');
  document.getElementById('backBtn').style.display = 'flex';
  document.getElementById('progressBar').classList.add('show');

  // Update title
  const titleEl = document.getElementById('topbarTitle');
  titleEl.textContent = entry.title.length > 20
    ? entry.title.slice(0, 20) + '…'
    : entry.title;

  // Load article
  frame.src = entry.path;

  // Apply dark mode and font size to iframe once loaded
  frame.onload = () => {
    applyIframeStyles(frame);
    trackProgress(frame);
  };

  // Show keyboard hint briefly
  showKeyHint();

  // Update URL hash
  history.pushState({ idx }, '', '#' + idx);

  window.scrollTo(0, 0);
}

function goBack() {
  isReading = false;
  currentIndex = -1;

  document.getElementById('readerView').classList.remove('active');
  document.getElementById('readerFrame').src = 'about:blank';
  document.getElementById('listView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('progressBar').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('topbarTitle').textContent = 'AutoFarm';

  history.pushState(null, '', location.pathname);

  requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

function goHome() {
  if (isReading) goBack();
}

function navigateArticle(direction) {
  if (!isReading) return;

  // Find next/prev in current filter
  const filtered = currentFilter === 'all'
    ? entries
    : entries.filter(e => e.type === entries[currentIndex].type);

  const currentInFiltered = filtered.findIndex(e => e._idx === currentIndex);
  const nextInFiltered = currentInFiltered + direction;

  if (nextInFiltered >= 0 && nextInFiltered < filtered.length) {
    openArticle(filtered[nextInFiltered]._idx);
  }
}

// ========== Filters ==========
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  renderList();
}

// ========== Theme ==========
function toggleTheme() {
  isDark = !isDark;
  applyTheme(isDark);
  localStorage.setItem('af-theme', isDark ? 'dark' : 'light');

  // Apply to iframe too
  if (isReading) {
    const frame = document.getElementById('readerFrame');
    applyIframeStyles(frame);
  }
}

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('sunIcon').style.display = dark ? 'none' : 'block';
  document.getElementById('moonIcon').style.display = dark ? 'block' : 'none';
  document.querySelector('meta[name="theme-color"]').content = dark ? '#121212' : '#faf9f6';
}

// ========== Font Size ==========
function toggleFontPopup() {
  const popup = document.getElementById('fontPopup');
  popup.classList.toggle('show');
  // Close on outside click
  if (popup.classList.contains('show')) {
    setTimeout(() => {
      document.addEventListener('click', closeFontPopup, { once: true });
    }, 10);
  }
}

function closeFontPopup(e) {
  const popup = document.getElementById('fontPopup');
  if (!document.getElementById('fontBtn').contains(e.target)) {
    popup.classList.remove('show');
  }
}

function setFontSize(size) {
  fontSize = size;
  localStorage.setItem('af-fontsize', size);
  updateFontButtons();

  if (isReading) {
    const frame = document.getElementById('readerFrame');
    applyIframeStyles(frame);
  }
}

function updateFontButtons() {
  document.querySelectorAll('.font-opt').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.size === fontSize);
  });
}

// ========== Iframe Styling ==========
function applyIframeStyles(frame) {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    if (!doc || !doc.body) return;

    // Font size
    const sizeMap = { small: '15px', medium: '17px', large: '19px' };
    doc.body.style.fontSize = sizeMap[fontSize] || '17px';

    // Dark mode: inject a style override
    let styleEl = doc.getElementById('af-reader-override');
    if (!styleEl) {
      styleEl = doc.createElement('style');
      styleEl.id = 'af-reader-override';
      doc.head.appendChild(styleEl);
    }

    if (isDark) {
      styleEl.textContent = `
        :root { color-scheme: dark; }
        body {
          background: #121212 !important;
          color: #d4d4d4 !important;
        }
        .page-wrap, .article, main, .content {
          background: #121212 !important;
        }
        .site-header, header:not(.hero) {
          border-color: #333 !important;
        }
        .hero {
          background: linear-gradient(135deg, #0a1220 0%, #121e30 100%) !important;
        }
        .story {
          background: #1e1e1e !important;
          border-color: #2e2e2e !important;
        }
        .story-title a, h1, h2, h3 {
          color: #e0e0e0 !important;
        }
        .story-source, .story-source a {
          color: #888 !important;
        }
        a { color: #7db8d4 !important; }
        .pullquote {
          background: #1a1a1a !important;
          border-color: #e8a87c !important;
          color: #ccc !important;
        }
        .tag, .type-badge {
          opacity: 0.85;
        }
        details summary {
          color: #888 !important;
        }
        .discussion, .discussions, [class*="discuss"] {
          background: #1a1a1a !important;
          border-color: #2e2e2e !important;
          color: #ccc !important;
        }
        .digest-meta, .card-date, .site-title, .date {
          color: #888 !important;
        }
        .chart-wrap {
          background: #0a0a0a !important;
        }
        .source-list, .sources, [class*="source-list"] {
          background: #1a1a1a !important;
          border-color: #2e2e2e !important;
        }
        * {
          scrollbar-color: #333 transparent;
        }
      `;
    } else {
      styleEl.textContent = '';
    }
  } catch (e) {
    // Cross-origin restrictions — silently ignore
  }
}

// ========== Reading Progress ==========
function trackProgress(frame) {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    const win = frame.contentWindow;
    if (!doc || !win) return;

    win.addEventListener('scroll', () => {
      const scrollTop = win.scrollY || doc.documentElement.scrollTop;
      const scrollHeight = doc.documentElement.scrollHeight - win.innerHeight;
      const pct = scrollHeight > 0 ? Math.min(100, (scrollTop / scrollHeight) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
    });
  } catch (e) {}
}

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isReading) {
    goBack();
  }
  if (isReading) {
    if (e.key === 'j' || e.key === 'J') navigateArticle(1);
    if (e.key === 'k' || e.key === 'K') navigateArticle(-1);
  }
});

// Browser back/forward
window.addEventListener('popstate', (e) => {
  if (e.state && typeof e.state.idx === 'number') {
    openArticle(e.state.idx);
  } else if (isReading) {
    goBack();
  }
});

function showKeyHint() {
  const hint = document.getElementById('keyHint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 3000);
}

// ========== Helpers ==========
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
