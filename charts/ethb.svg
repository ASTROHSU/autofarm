<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 230" width="1650" height="575">
<rect width="660" height="230" fill="white"/>
<rect x="10" y="75" width="120" height="50" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="70" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9" font-family="Droid Sans Fallback">ETH 質押獎勵</text>
<text x="70" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9" font-family="Droid Sans Fallback">~3.5% APY</text>

<line x1="130" y1="100" x2="200" y2="100" stroke="#8b5cf6" stroke-width="2"/>
<polygon points="200,97 208,100 200,103" fill="#8b5cf6"/>

<circle cx="222" cy="100" r="14" fill="#8b5cf6"/>
<text x="222" y="105" text-anchor="middle" font-size="11" fill="white" font-weight="700" font-family="Droid Sans Fallback">分</text>

<line x1="236" y1="90" x2="305" y2="50" stroke="#10b981" stroke-width="2"/>
<polygon points="305,46 310,55 300,53" fill="#10b981"/>
<text x="268" y="60" font-size="10" fill="#10b981" font-weight="600" font-family="Droid Sans Fallback">82%</text>

<rect x="310" y="25" width="180" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="400" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46" font-family="Droid Sans Fallback">ETHB 投資人</text>
<text x="400" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="Droid Sans Fallback">82% = ~2.87% APY</text>

<line x1="236" y1="110" x2="305" y2="150" stroke="#f59e0b" stroke-width="2"/>
<polygon points="305,147 310,156 300,153" fill="#f59e0b"/>
<text x="268" y="145" font-size="10" fill="#d97706" font-weight="600" font-family="Droid Sans Fallback">18%</text>

<rect x="310" y="125" width="180" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="400" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e" font-family="Droid Sans Fallback">BlackRock + Coinbase</text>
<text x="400" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e" font-family="Droid Sans Fallback">18% = ~0.63%</text>

<rect x="520" y="60" width="130" height="90" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="585" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#2563eb" font-family="Droid Sans Fallback">Coinbase 雙重角色</text>
<line x1="530" y1="90" x2="640" y2="90" stroke="#e5e7eb" stroke-width="1"/>
<text x="585" y="110" text-anchor="middle" font-size="11" fill="#1e40af" font-family="Droid Sans Fallback">託管方</text>
<text x="585" y="127" text-anchor="middle" font-size="9" fill="#6b7280" font-family="Droid Sans Fallback">逾 80% 美國加密 ETP</text>
<text x="585" y="145" text-anchor="middle" font-size="11" fill="#1e40af" font-family="Droid Sans Fallback">質押執行方</text>

<line x1="490" y1="50" x2="520" y2="80" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="490" y1="150" x2="520" y2="130" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>

<text x="10" y="220" font-size="10" fill="#6b7280" font-family="Droid Sans Fallback">綠色 = 投資人收益    橘色 = 平台抽成    藍色虛線 = Coinbase 角色</text>
</svg>
